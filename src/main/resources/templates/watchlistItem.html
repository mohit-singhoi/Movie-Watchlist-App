<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <link rel="stylesheet"
          href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css">
		  
		  <style>

		  td {
		      word-break: break-word;
		      max-width: 300px;
		  }

		  a {
		      word-break: break-all;
		  }

		  /* Heading shadow */
		  h2 {
		      text-shadow: 2px 2px 5px gray;
		      font-weight: bold;
		  }
		  

		  </style>

    <title>Submit a Movie</title>
</head>

<body>

<div class="container">

    <nav class="navbar navbar-expand-sm navbar-dark bg-secondary">

        <a class="navbar-brand" href="/">
            Watchlist App
        </a>

        <button class="navbar-toggler"
                type="button"
                data-toggle="collapse"
                data-target="#navbarSupportedContent"
                aria-controls="navbarSupportedContent"
                aria-expanded="false"
                aria-label="Toggle navigation">

            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse"
             id="navbarSupportedContent">

            <ul class="navbar-nav mr-auto">

                <li class="nav-item">
                    <a class="nav-link" href="/">
                        Home
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="watchlist">
                        Watchlist
                    </a>
                </li>

                <li class="nav-item active">
                    <a class="nav-link" href="watchlistItemForm">
                        Submit an item
                    </a>
                </li>

            </ul>

        </div>

    </nav>

    <h2 class="mt-4 mb-4">Submit a Movie</h2>
	


    <form  th:action = "@{/watchlistItemForm}" action = "#" method="post" th:object ="${watchlistItem}">

        <!-- Title -->
        <div class="form-group row">

            <label for="title"
                   class="col-sm-2 col-form-label">
                Title
            </label>

            <div class="col-sm-4">
                <input th:field = "*{title}" type="text"
                       id="title"
                       class="form-control"
                       placeholder="Mandatory">
            </div>

            <div class="col-sm-4">
				<span class="text-danger"
				      th:if="${#fields.hasErrors('title')}"
				      th:errors="*{title}">
				</span>
            </div>

        </div>

        <!-- Rating -->
        <div class="form-group row">

            <label for="rating"
                   class="col-sm-2 col-form-label">
                Rating
            </label>

            <div class="col-sm-4">
                <input th:field = "*{rating}" type="number"
                       step="0.1"
                       id="rating"
                       class="form-control"
                       placeholder="5.0 <= Number <= 10.0">
            </div>

            <div class="col-sm-4">
				<span class="text-danger"
				      th:if="${#fields.hasErrors('rating')}"
				      th:errors="*{rating}">
				</span>
            </div>

        </div>
		
		<!-- Source -->
		        <div class="form-group row">

		            <label for="source"
		                   class="col-sm-2 col-form-label">
		                Source
		            </label>

		            <div class="col-sm-4">
		                <input th:field = "*{source}" type="text"
		                       step="0.1"
		                       id="source"
		                       class="form-control"
		                       placeholder="Paste Movie Source Link ">
		            </div>

		            <div class="col-sm-4">
		                <span class="text-danger"></span>
		            </div>

		        </div>

		        

        <!-- Priority -->
        <div class="form-group row">

            <label for="priority"
                   class="col-sm-2 col-form-label mr-0">
                Priority
            </label>

            <div class="col-sm-4">
                <input th:field = "*{priority}" type="text"
                       id="priority"
                       class="form-control"
                       placeholder="Low|Medium|High">
            </div>

            <div class="col-sm-4">
				<span class="text-danger"
				      th:if="${#fields.hasErrors('priority')}"
				      th:errors="*{priority}">
				</span>
            </div>

        </div>
		
		

        <!-- Comments -->
        <div class="form-group row">

            <label for="comments"
                   class="col-sm-2 col-form-label">
                Comments
            </label>

            <div class="col-sm-4">
                <textarea th:field = "*{comment}" id="comments"
                          class="form-control"
                          rows="3"
                          placeholder="Max. 50 chars"></textarea>
            </div>

            <div class="col-sm-4">
				<span class="text-danger"
				      th:if="${#fields.hasErrors('comment')}"
				      th:errors="*{comment}">
				</span>
            </div>

        </div>

        <!-- Submit Button -->
        <div class="form-group row">

            <div class="col-sm-10">
				<input type = "hidden" th:field = "*{id}"/>
                <button type="submit"
                        class="btn btn-primary">
                    Submit
                </button>
            </div>

        </div>

    </form>

</div>

<script src="https://code.jquery.com/jquery-3.3.1.slim.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.3/umd/popper.min.js"></script>
<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/js/bootstrap.min.js"></script>

</body>
</html>
