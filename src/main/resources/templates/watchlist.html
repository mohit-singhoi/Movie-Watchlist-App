<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <!-- Bootstrap CSS -->
    <link rel="stylesheet"
          href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css">
	
		  <style>

		  td {
		      word-break: break-word;
		      max-width: 300px;
		  }

		  a {
		      word-break: break-all;
		  }

		  /* Heading shadow */
		  h2 {
		      text-shadow: 2px 2px 5px gray;
		      font-weight: bold;
		  }

		  /* Table shadow */
		  .table-box {
		      box-shadow: 0px 4px 15px rgba(0,0,0,0.2);
		      border-radius: 5px;
		      overflow: hidden;
		  }

		  .table {
		      margin-bottom: 0;
		  }
		  
		  .table {
		      width: 100%;
		      table-layout: auto;
		  }

		  /* Button alignment */
		  td {
		      vertical-align: middle;
		  }

		  /* Delete button */
		  .btn-danger {
		      background-color: #dc3545;
		      border-color: #dc3545;
		  }

		  </style>

		 

    <title>Watchlist App</title>
</head>

<body>

<div class="container">

    <!-- Navbar -->
    <nav class="navbar navbar-expand-sm navbar-dark bg-secondary">

        <a class="navbar-brand" href="/">
            Watchlist App
        </a>

        <button class="navbar-toggler"
                type="button"
                data-toggle="collapse"
                data-target="#navbarSupportedContent"
                aria-controls="navbarSupportedContent"
                aria-expanded="false"
                aria-label="Toggle navigation">

            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse"
             id="navbarSupportedContent">

            <ul class="navbar-nav mr-auto">

                <li class="nav-item">
                    <a class="nav-link"
                       href="/">
                        Home
                    </a>
                </li>

                <li class="nav-item active">
                    <a class="nav-link"
                       href="watchlist">
                        Watchlist
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link"
                       href="watchlistItemForm">
                        Submit an item
                    </a>
                </li>

            </ul>
        </div>
    </nav>

    <!-- Heading -->
    <h2 class="mt-4">Watchlist</h2>

    <!-- Table -->
	<div class="table-box">
	<table class="table">

        <thead class="thead-light">
        <tr>
            <th class="text-left">Title</th>
            <th class="text-left">Rating</th>
			<th class="text-left">Source</th>
            <th class="text-left">Priority</th>
            <th class="text-left">Comment</th>
            <th class="text-left"></th>
			<th class="text-left"></th>
        </tr>
        </thead>

        <tbody>

        <tr th:each = "movie :${watchlistrows}">
            <td th:text = "${movie.title}">Avatar</td>
            <td th:text = "${movie.rating}" >7.8</td>
			<td>
			    <a th:href="${movie.source}"
			       target="_blank">
			        Watch
			    </a>
			</td>
            <td th:text = "${movie.priority}">LOW</td>
            <td th:text = "${movie.comment}">Peter recommended</td>
			
			
            <td>

				    <a class="btn btn-info"
				       role="button"
				       th:href="@{/watchlistItemForm(id=${movie.id})}">
				        Update
				    </a>
				
			<td>
            
				<a class="btn btn-danger"
				   role="button"
				   th:href="@{/delete(id=${movie.id})}">
				    Delete
				</a>
			</td>
			
			
        </tr>


        </tbody>

    </table>
	</div>

    <hr>

	<div>
	    Number of movies to watch:
	    <span th:text="${noofmovies}"></span>
	</div>

</div>

<!-- Bootstrap JS -->
<script src="https://code.jquery.com/jquery-3.3.1.slim.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.3/umd/popper.min.js"></script>
<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/js/bootstrap.min.js"></script>

</body>
</html>
